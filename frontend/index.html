<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lang Audio Tool</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code&display=swap" rel="stylesheet" />
</head>
<body>

<div id="topbar">
  <h1>Lang Audio Tool</h1>
  <span class="spacer"></span>
  <button class="btn-ghost" id="btn-save" style="display:none">Save</button>
  <button class="btn-primary" id="btn-export" style="display:none">Export ZIP</button>
</div>

<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      Projects
      <button class="btn-icon" id="btn-new" title="New project">+</button>
    </div>
    <div id="project-list"></div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Upload zone -->
    <div id="upload-zone">
      <div id="drop-area">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
        </svg>
        <h2>Upload Audio</h2>
        <p>Drag &amp; drop or click to select a file</p>
        <p class="formats">MP3 · M4A · WAV · OGG · FLAC</p>
        <div class="lang-select-row" onclick="event.stopPropagation()">
          <label for="lang-select">Language</label>
          <select id="lang-select">
            <option value="">Auto-detect</option>
            <optgroup label="East / Southeast Asia">
              <option value="th">Thai (ภาษาไทย)</option>
              <option value="km">Khmer (ខ្មែរ)</option>
              <option value="ja">Japanese (日本語)</option>
              <option value="zh">Chinese (中文)</option>
              <option value="ko">Korean (한국어)</option>
              <option value="vi">Vietnamese (Tiếng Việt)</option>
              <option value="id">Indonesian</option>
              <option value="ms">Malay</option>
              <option value="lo">Lao (ລາວ)</option>
              <option value="my">Burmese (မြန်မာ)</option>
            </optgroup>
            <optgroup label="South Asia">
              <option value="hi">Hindi (हिन्दी)</option>
              <option value="ta">Tamil (தமிழ்)</option>
              <option value="te">Telugu (తెలుగు)</option>
              <option value="ur">Urdu (اردو)</option>
            </optgroup>
            <optgroup label="Europe">
              <option value="en">English</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="es">Spanish</option>
              <option value="pt">Portuguese</option>
              <option value="it">Italian</option>
              <option value="ru">Russian</option>
              <option value="pl">Polish</option>
              <option value="nl">Dutch</option>
              <option value="tr">Turkish</option>
            </optgroup>
            <optgroup label="Middle East / Africa">
              <option value="ar">Arabic (العربية)</option>
              <option value="he">Hebrew (עברית)</option>
              <option value="fa">Persian (فارسی)</option>
            </optgroup>
          </select>
        </div>
        <input type="file" id="file-input" accept=".mp3,.m4a,.wav,.ogg,.flac" style="display:none" />
      </div>
    </div>

    <!-- Processing -->
    <div id="processing-overlay" class="hidden">
      <div class="spinner"></div>
      <p id="processing-msg">Transcribing…</p>
    </div>

    <!-- Editor -->
    <div id="editor" class="hidden">

      <div id="player-bar">
        <span class="filename" id="player-filename"></span>
        <span class="lang-badge" id="player-lang"></span>
        <span class="spacer"></span>
        <div id="waveform-container">
          <audio id="audio-player" controls style="width:100%;height:40px;"></audio>
        </div>
      </div>

      <div id="segment-area">
        <div id="seg-count-label" class="seg-count-header"></div>
        <div id="segment-list"></div>
      </div>

    </div>

  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
